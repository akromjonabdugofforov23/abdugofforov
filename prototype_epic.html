<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epic Design - Prototype</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700;900&display=swap');
        
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            background-color: #000;
        }

        /* 1. Kuchli Rasm va Animatsiya (Epic Background) */
        .bg-container {
            position: absolute;
            top: -10%; left: -10%; width: 120%; height: 120%;
            /* Ajoyib 3D mavhum rasm (Suyuqlik/Sferalar) */
            background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            z-index: 0;
            /* Kuchli orqa fon animatsiyasi: Rasm sekin yaqinlashib/uzoqlashadi va ranglari o'zgaradi */
            animation: epicBg 20s infinite alternate linear;
        }

        /* Yaltiroq zarrachalar overlay */
        .bg-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 0%, #000 120%);
            z-index: 1;
            /* Yulduzdek miltillash effekti */
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' fill='transparent'/%3E%3Crect width='100' height='100' filter='url(%23n)' opacity='0.15'/%3E%3C/svg%3E");
            animation: pulseOverlay 4s infinite alternate;
        }

        @keyframes epicBg {
            0% { transform: scale(1); filter: hue-rotate(0deg) contrast(1.2); }
            50% { transform: scale(1.1) rotate(2deg); filter: hue-rotate(90deg) contrast(1.5) brightness(1.2); }
            100% { transform: scale(1.05) rotate(-2deg); filter: hue-rotate(180deg) contrast(1.2); }
        }

        @keyframes pulseOverlay {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        /* 2. Asosiy 3D Sahnadagi Shisha Oyna */
        .scene {
            position: relative;
            z-index: 10;
            width: 100%; height: 100%;
            perspective: 1500px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .epic-glass {
            position: relative;
            width: 700px;
            min-height: 450px;
            background: rgba(25, 25, 35, 0.4);
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            border-left: 1px solid rgba(255, 255, 255, 0.4);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 
                0 30px 60px rgba(0,0,0,0.6), 
                inset 0 0 20px rgba(255, 255, 255, 0.2);
            transform-style: preserve-3d;
            /* Sichqoncha orqali aylanish */
            transform: rotateX(calc(var(--rot-y, 0) * 20deg)) rotateY(calc(var(--rot-x, 0) * 20deg));
            transition: transform 0.1s ease-out;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Shisha ichidagi nurlanish effekti (Glare) */
        .epic-glass::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(to bottom right, rgba(255,255,255,0.3) 0%, transparent 40%, transparent 100%);
            transform: rotate(45deg);
            pointer-events: none;
            transition: transform 0.2s;
        }

        .epic-content {
            transform: translateZ(80px); /* 3D da oldinga chiqib turadi */
            text-align: center;
            color: #fff;
            padding: 40px;
            pointer-events: none;
        }

        .epic-content h1 {
            font-size: 4rem;
            margin: 0;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.8);
            background: linear-gradient(to right, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .epic-content h2 {
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 5px;
            margin: 10px 0 40px 0;
            color: #c7d2fe;
            text-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .epic-btn {
            pointer-events: auto;
            transform: translateZ(100px);
            background: linear-gradient(45deg, #4f46e5, #ec4899);
            border: none;
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(236, 72, 153, 0.4);
            transition: all 0.3s;
        }

        .epic-btn:hover {
            box-shadow: 0 15px 40px rgba(236, 72, 153, 0.6);
            transform: scale(1.1);
        }

        /* 3D elementlarni qo'shimcha boyitish */
        .floating-element {
            position: absolute;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            width: 120px;
            height: 120px;
            z-index: 15;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        
        .el-1 { top: 20%; left: 15%; transform: translateZ(150px) rotate(-15deg); animation: float1 4s infinite alternate; }
        .el-2 { bottom: 20%; right: 15%; transform: translateZ(200px) rotate(15deg); animation: float2 5s infinite alternate; }

        @keyframes float1 { 0% { transform: translateZ(150px) translateY(0) rotate(-15deg); } 100% { transform: translateZ(150px) translateY(-30px) rotate(-5deg); } }
        @keyframes float2 { 0% { transform: translateZ(200px) translateY(0) rotate(15deg); } 100% { transform: translateZ(200px) translateY(30px) rotate(5deg); } }

    </style>
</head>
<body>

    <!-- Kuchli animatsiyali va o'zgaruvchan rangli orqa fon rasmi -->
    <div class="bg-container"></div>
    <div class="bg-overlay"></div>

    <div class="scene">
        
        <!-- Yon atrofda uchib yuruvchi 3D elementlar -->
        <div class="floating-element el-1">💻</div>
        <div class="floating-element el-2">⚕️</div>

        <!-- Asosiy kuchli shisha oyna -->
        <div class="epic-glass" id="epic-card">
            <div class="epic-content">
                <h1>Abdugofforov</h1>
                <h2>SOFTWARE & MEDICAL</h2>
                <button class="epic-btn">START EXPERIENCE</button>
            </div>
        </div>
    </div>

    <script>
        const scene = document.querySelector('.scene');
        const card = document.getElementById('epic-card');

        // Barcha 3D effektlar uchun bitta markazlashgan sichqoncha kuzatuvchi
        window.addEventListener('mousemove', (e) => {
            requestAnimationFrame(() => {
                const x = (e.clientX / window.innerWidth) * 2 - 1; // -1 to 1
                const y = (e.clientY / window.innerHeight) * 2 - 1; // -1 to 1
                
                // CSS o'zgaruvchilarga qiymat uzatish
                card.style.setProperty('--rot-x', x);
                card.style.setProperty('--rot-y', -y);

                // Orqa fonni ham sichqonchaga qarab sal qimirlatish (Parallax)
                const bg = document.querySelector('.bg-container');
                bg.style.transform = `scale(1.1) translate(${x * -20}px, ${y * -20}px)`;
            });
        });
    </script>
</body>
</html>
