<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Glass - Prototype</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root[data-theme="light"] {
            /* O'ta mayin, qimmatbaho kunduzgi rejim (Apple uslubi) */
            --bg-base: #f9fafb; /* Yumshoq sut rang */
            --mesh-1: #e0e7ff; /* Och binafsha */
            --mesh-2: #fae8ff; /* Och pushti */
            --mesh-3: #ccfbf1; /* Och yalpiz */
            
            --glass-bg: rgba(255, 255, 255, 0.4); /* Tiniq oq shisha */
            --glass-border: rgba(255, 255, 255, 0.8);
            --glass-shadow: 0 20px 40px rgba(0, 0, 0, 0.04), inset 0 0 0 1px rgba(255,255,255,0.5);
            
            --text-main: #111827; /* Yumshoq to'q kulrang, qora emas */
            --text-sub: #4b5563;
            --accent: #4f46e5;
        }

        :root[data-theme="dark"] {
            /* Tungi rejim */
            --bg-base: #030712; /* O'ta to'q qora */
            --mesh-1: #312e81; /* To'q binafsha */
            --mesh-2: #831843; /* To'q malina */
            --mesh-3: #064e3b; /* To'q zumrad */
            
            --glass-bg: rgba(17, 24, 39, 0.4); /* Qora shisha */
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), inset 0 0 0 1px rgba(255,255,255,0.05);
            
            --text-main: #f9fafb;
            --text-sub: #9ca3af;
            --accent: #818cf8;
        }

        body {
            margin: 0; padding: 0; height: 100vh;
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: background-color 0.5s ease;
        }

        /* Gradient Mesh Background (Aurora) */
        .mesh-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .mesh-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.8;
            animation: float 20s infinite alternate ease-in-out;
            transition: background-color 0.5s ease;
        }

        .blob-1 { width: 600px; height: 600px; background: var(--mesh-1); top: -10%; left: -10%; }
        .blob-2 { width: 500px; height: 500px; background: var(--mesh-2); bottom: -10%; right: -10%; animation-delay: -5s; }
        .blob-3 { width: 400px; height: 400px; background: var(--mesh-3); top: 40%; left: 40%; animation-delay: -10s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, -50px) scale(1.2); }
        }

        /* 3D Container */
        .scene {
            perspective: 1200px;
            z-index: 10;
        }

        .glass-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 50px;
            width: 700px;
            backdrop-filter: blur(24px); /* Sifatli va qimmat xiralik */
            -webkit-backdrop-filter: blur(24px);
            box-shadow: var(--glass-shadow);
            transition: transform 0.1s ease-out, background 0.5s, border 0.5s, box-shadow 0.5s;
            transform-style: preserve-3d;
            
            /* JS orqali boshqariladigan 3D aylanish */
            transform: rotateX(calc(var(--mouse-y, 0) * 10deg)) rotateY(calc(var(--mouse-x, 0) * 10deg));
        }

        /* Layered Content for Parallax */
        .content-layer {
            transform: translateZ(40px); /* Havoda muallaq turadi */
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin: 0 0 15px 0;
            letter-spacing: -1px;
            background: linear-gradient(135deg, var(--text-main), var(--text-sub));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: var(--text-sub);
            margin: 0 0 30px 0;
            max-width: 500px;
        }

        .action-btn {
            background: var(--text-main);
            color: var(--bg-base);
            border: none;
            padding: 16px 32px;
            border-radius: 100px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transform: translateZ(60px); /* Tugma eng oldinda turadi */
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .action-btn:hover {
            transform: translateZ(70px) scale(1.05);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }

        .theme-toggle {
            position: absolute;
            top: 30px;
            right: 30px;
            z-index: 100;
            padding: 12px 24px;
            border-radius: 100px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            color: var(--text-main);
            backdrop-filter: blur(10px);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .theme-toggle:hover {
            background: var(--text-main);
            color: var(--bg-base);
        }

    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()">To'q rejimga o'tish</button>

    <div class="mesh-bg">
        <div class="mesh-blob blob-1"></div>
        <div class="mesh-blob blob-2"></div>
        <div class="mesh-blob blob-3"></div>
    </div>

    <div class="scene">
        <div class="glass-card" id="card">
            <div class="content-layer">
                <h1>Abdugofforov.</h1>
                <p>Bu haqiqiy "Premium" yondashuv. Zaharli (neon) ranglarsiz, o'ta mayin va ko'zni charchatmaydigan aurora ranglari. Shisha oynalar xuddi Apple kabi yumshoq.</p>
                <button class="action-btn">Kashf etish</button>
            </div>
        </div>
    </div>

    <script>
        const card = document.getElementById('card');

        // Smooth, non-laggy 3D effect
        window.addEventListener('mousemove', (e) => {
            requestAnimationFrame(() => {
                const x = (e.clientX / window.innerWidth) * 2 - 1;
                const y = (e.clientY / window.innerHeight) * 2 - 1;
                card.style.setProperty('--mouse-x', x);
                card.style.setProperty('--mouse-y', -y);
            });
        });

        function toggleTheme() {
            const html = document.documentElement;
            const btn = document.querySelector('.theme-toggle');
            if (html.getAttribute('data-theme') === 'dark') {
                html.setAttribute('data-theme', 'light');
                btn.textContent = "To'q rejimga o'tish";
            } else {
                html.setAttribute('data-theme', 'dark');
                btn.textContent = "Yorug' rejimga o'tish";
            }
        }
    </script>
</body>
</html>
