<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber-Medical - Prototype (Light/Dark)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Roboto:wght@300;500;700&display=swap');
        
        :root[data-theme="dark"] {
            --bg-main: #030f1c;
            --text-main: #e0f2fe;
            --text-sub: #bae6fd;
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(14, 165, 233, 0.3);
            --accent-cyan: #0ea5e9;
            --accent-glow: rgba(14, 165, 233, 0.5);
            --accent-orange: #f97316;
            --box-bg: rgba(0, 0, 0, 0.2);
            --canvas-stroke: rgba(14, 165, 233, 0.5);
            --grid-color: rgba(14, 165, 233, 0.05);
            --shadow-glass: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(14, 165, 233, 0.1);
        }

        :root[data-theme="light"] {
            --bg-main: #f0f9ff; /* Sterile medical white/blue */
            --text-main: #0f172a;
            --text-sub: #334155;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(2, 132, 199, 0.2);
            --accent-cyan: #0284c7; /* Darker cyan for contrast */
            --accent-glow: rgba(2, 132, 199, 0.2);
            --accent-orange: #ea580c; /* Darker orange */
            --box-bg: rgba(255, 255, 255, 0.5);
            --canvas-stroke: rgba(139, 0, 0, 0.7);
            --grid-color: rgba(139, 0, 0, 0.15);
            --shadow-glass: 0 20px 50px rgba(2, 132, 199, 0.1), inset 0 0 20px rgba(255, 255, 255, 0.8);
        }

        body {
            margin: 0; padding: 0; height: 100vh;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: background-color 0.4s ease, color 0.4s ease;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Abstract Heartbeat/DNA Data-Viz Canvas */
        #data-viz {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            opacity: 0.6;
        }

        .glass-panel {
            position: relative;
            z-index: 10;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 40px;
            width: 600px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: var(--shadow-glass);
            display: flex;
            flex-direction: column;
            gap: 20px;
            transition: all 0.4s ease;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 20px;
            transition: border-color 0.4s ease;
        }

        h1 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2rem;
            margin: 0;
            color: var(--accent-cyan);
            text-shadow: 0 0 10px var(--accent-glow);
            transition: color 0.4s ease;
        }

        .status {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--accent-orange);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.4s ease;
        }

        .status-dot {
            width: 8px; height: 8px;
            background: var(--accent-orange);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
            transition: background 0.4s ease;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .data-box {
            background: var(--box-bg);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 20px;
            transition: all 0.3s;
        }

        .data-box:hover {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 15px var(--accent-glow);
            transform: translateY(-2px);
        }

        .data-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--accent-cyan);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            transition: color 0.4s ease;
        }

        .data-value {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            color: var(--text-main);
            backdrop-filter: blur(10px);
            font-family: 'JetBrains Mono', monospace;
            cursor: pointer;
            transition: all 0.4s;
        }
        .theme-toggle:hover {
            background: var(--accent-cyan);
            color: #fff;
        }

    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()">MODE: DARK</button>

    <canvas id="data-viz"></canvas>

    <div class="glass-panel">
        <div class="header">
            <h1>SYS.MD_DEV</h1>
            <div class="status">
                <div class="status-dot"></div>
                SYSTEM ONLINE
            </div>
        </div>
        <p id="desc-text" style="font-weight: 300; line-height: 1.6; color: var(--text-sub); transition: color 0.4s ease;">
            Integrating medical sciences with computational precision. A sterile, high-tech interface designed for maximum efficiency and clarity.
        </p>
        <div class="content">
            <div class="data-box">
                <div class="data-label">Vitals / Logic</div>
                <div class="data-value">Stable</div>
            </div>
            <div class="data-box">
                <div class="data-label">Network / Nodes</div>
                <div class="data-value">1,024</div>
            </div>
        </div>
    </div>

    <script>
        // Simple heartbeat/sine wave canvas animation
        const canvas = document.getElementById('data-viz');
        const ctx = canvas.getContext('2d');
        let width, height;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let time = 0;
        function draw() {
            ctx.clearRect(0, 0, width, height);
            ctx.beginPath();
            
            // Get stroke color dynamically from CSS variable based on theme
            const computedStyle = getComputedStyle(document.body);
            ctx.strokeStyle = computedStyle.getPropertyValue('--canvas-stroke').trim();
            ctx.lineWidth = 2;

            for(let x = 0; x < width; x++) {
                // Creates a heartbeat-like complex wave
                const y = height/2 
                    + Math.sin(x * 0.01 + time) * 50 
                    + Math.sin(x * 0.05 - time*2) * 20
                    + (x % 300 < 50 ? Math.sin(x * 0.2) * 100 : 0); // Spikes
                
                if(x === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
            time += 0.02;
            requestAnimationFrame(draw);
        }
        draw();

        // Theme Toggle logic
        function toggleTheme() {
            const html = document.documentElement;
            const btn = document.querySelector('.theme-toggle');
            if (html.getAttribute('data-theme') === 'dark') {
                html.setAttribute('data-theme', 'light');
                btn.textContent = 'MODE: LIGHT';
            } else {
                html.setAttribute('data-theme', 'dark');
                btn.textContent = 'MODE: DARK';
            }
        }
    </script>
</body>
</html>
