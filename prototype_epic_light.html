<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epic Light Mode - Prototype</title>
    <!-- Three.js va Vanta.js (Waves) - Kunduzgi rejim uchun o'ta kuchli 3D fon -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.waves.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Clash+Display:wght@500;700&family=Inter:wght@400;500&display=swap');
        
        body, html {
            margin: 0; padding: 0; height: 100%;
            overflow: hidden;
            background-color: #ffffff; /* Asosiy Kunduzgi Fon */
            font-family: 'Inter', sans-serif;
            color: #0f172a; /* To'q ko'k/qora yozuvlar */
        }

        /* 3D To'lqinlar Orqa Foni */
        #vanta-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
        }

        /* Sahnaning o'zi */
        .scene {
            position: relative;
            z-index: 10;
            width: 100%; height: 100%;
            perspective: 2000px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Kunduzgi rejimdagi Qimmatbaho Shisha Oyna */
        .light-glass {
            position: relative;
            width: 800px;
            min-height: 500px;
            /* O'ta shaffof, lekin yorug' shisha */
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: 30px;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            /* Kunduzgi rejimda kuchli vizual uchun juda katta va mayin soya kerak */
            box-shadow: 
                0 40px 100px rgba(14, 165, 233, 0.15),
                inset 0 2px 0 rgba(255, 255, 255, 1);
            transform-style: preserve-3d;
            transform: rotateX(calc(var(--rot-y, 0) * 20deg)) rotateY(calc(var(--rot-x, 0) * 20deg));
            transition: transform 0.1s linear, box-shadow 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .light-glass:hover {
            box-shadow: 
                0 60px 120px rgba(14, 165, 233, 0.25),
                inset 0 2px 0 rgba(255, 255, 255, 1);
        }

        /* Yaltiroq effekt (Glare) Kunduzgi rejim uchun */
        .light-glass::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(135deg, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 40%, rgba(255,255,255,0) 100%);
            transform: translateZ(1px);
            pointer-events: none;
        }

        .content {
            transform: translateZ(100px); /* Yozuvlar oynadan sakrab chiqib turadi */
            text-align: center;
            pointer-events: none;
            width: 100%;
            padding: 40px;
        }

        h1 {
            font-family: 'Clash Display', sans-serif; /* Juda modern tipografiya */
            font-size: 5rem;
            font-weight: 700;
            margin: 0;
            /* Kunduzgi rejimda neon emas, balki chuqur ranglar ishlatiladi */
            background: linear-gradient(135deg, #0284c7, #4f46e5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 30px rgba(2, 132, 199, 0.2);
        }

        .subtitle {
            font-size: 1.2rem;
            color: #334155;
            letter-spacing: 4px;
            margin: 20px 0 40px 0;
            text-transform: uppercase;
            font-weight: 500;
        }

        /* Kunduzgi rejimdagi Kuchli Tugma */
        .epic-btn-light {
            pointer-events: auto;
            transform: translateZ(120px);
            background: linear-gradient(135deg, #0284c7, #2563eb);
            border: none;
            color: #ffffff;
            padding: 18px 50px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 100px;
            cursor: pointer;
            box-shadow: 0 20px 40px rgba(2, 132, 199, 0.3);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .epic-btn-light:hover {
            transform: translateZ(140px) scale(1.1);
            box-shadow: 0 30px 60px rgba(2, 132, 199, 0.4);
            background: linear-gradient(135deg, #0369a1, #1d4ed8);
        }

        /* Yon atrofda havoda muallaq turuvchi oq shisha bloklar */
        .float-box {
            position: absolute;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 1);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            z-index: 15;
            animation: float-anim 5s infinite alternate ease-in-out;
        }

        .fb-1 { width: 120px; height: 120px; top: 15%; left: 15%; transform: translateZ(250px); }
        .fb-2 { width: 100px; height: 100px; bottom: 20%; right: 15%; transform: translateZ(300px); animation-delay: -2s; border-radius: 50%; }

        @keyframes float-anim {
            0% { transform: translateZ(250px) translateY(0); }
            100% { transform: translateZ(250px) translateY(-30px); }
        }

    </style>
</head>
<body>

    <!-- Kunduzgi rejim uchun o'ta yorqin, 3D dengiz to'lqinlari foni -->
    <div id="vanta-bg"></div>

    <div class="scene">
        
        <!-- Yon atrofdagi shishalar -->
        <div class="float-box fb-1">🌊</div>
        <div class="float-box fb-2">⚕️</div>

        <!-- Asosiy shisha -->
        <div class="light-glass" id="card">
            <div class="content">
                <h1>ABDUGOFFOROV</h1>
                <div class="subtitle">Medical & Development</div>
                <button class="epic-btn-light">EXPLORE SYSTEM</button>
            </div>
        </div>
    </div>

    <script>
        // 1. VANTA.JS WAVES - Kunduzgi rejim uchun maxsus moslangan 3D to'lqinlar
        VANTA.WAVES({
            el: "#vanta-bg",
            mouseControls: true,
            touchControls: true,
            gyroControls: true,
            minHeight: 200.00,
            minWidth: 200.00,
            scale: 1.00,
            scaleMobile: 1.00,
            color: 0xe0f2fe, /* Juda och havorang to'lqinlar */
            backgroundColor: 0xffffff, /* Mutlaqo oppoq fon */
            shininess: 150.00,
            waveHeight: 30.00,
            waveSpeed: 1.20,
            zoom: 0.8
        });

        // 2. 3D Shisha effekti
        const card = document.getElementById('card');
        
        window.addEventListener('mousemove', (e) => {
            requestAnimationFrame(() => {
                const x = (e.clientX / window.innerWidth) * 2 - 1;
                const y = (e.clientY / window.innerHeight) * 2 - 1;
                
                card.style.setProperty('--rot-x', x);
                card.style.setProperty('--rot-y', -y);
            });
        });
    </script>
</body>
</html>
