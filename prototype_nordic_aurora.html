<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nordic Aurora - Prototype</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Inter:wght@300;400;600&display=swap');
        
        body {
            margin: 0; padding: 0; height: 100vh;
            background-color: #f7f7f8;
            color: #1a1a1a;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* The Aurora element - a subtle, elegant gradient orb */
        .aurora {
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle at center, rgba(139, 92, 246, 0.15) 0%, rgba(251, 113, 133, 0.1) 40%, transparent 70%);
            border-radius: 50%;
            filter: blur(60px);
            animation: drift 15s infinite alternate ease-in-out;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes drift {
            0% { transform: translate(-10%, 10%) scale(1); }
            100% { transform: translate(10%, -10%) scale(1.1); }
        }

        /* The Minimalist Card */
        .card {
            z-index: 10;
            width: 450px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.05);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            /* Magnetic effect will be applied here */
        }

        .card:hover {
            transform: scale(1.02);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            font-weight: 600;
            margin: 0 0 15px 0;
            letter-spacing: -1px;
            color: #111;
        }

        h1 span {
            color: #059669; /* Emerald Green Accent */
            font-style: italic;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #555;
            margin-bottom: 40px;
            font-weight: 300;
        }

        .btn {
            display: inline-block;
            background: #111;
            color: #fff;
            padding: 16px 36px;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .btn:hover {
            background: #059669;
            box-shadow: 0 15px 30px rgba(5, 150, 105, 0.3);
            transform: translateY(-2px);
        }

    </style>
</head>
<body>

    <div class="aurora"></div>

    <div class="card" id="magnetic-card">
        <h1>Abdugofforov<span>.</span></h1>
        <p>A fusion of Medical Science and Software Engineering. Clean, precise, and deeply impactful. This is the Nordic Aurora experience.</p>
        <a href="#" class="btn">Explore Work</a>
    </div>

    <script>
        // Magnetic Hover Effect
        const card = document.getElementById('magnetic-card');
        
        document.addEventListener('mousemove', (e) => {
            const rect = card.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const distX = e.clientX - centerX;
            const distY = e.clientY - centerY;

            // Karta atrofidagi 300px radiusda magnit tortishadi
            if (Math.abs(distX) < 400 && Math.abs(distY) < 400) {
                const magneticX = distX * 0.05;
                const magneticY = distY * 0.05;
                card.style.transform = `translate(${magneticX}px, ${magneticY}px) scale(1.02)`;
            } else {
                card.style.transform = `translate(0px, 0px) scale(1)`;
            }
        });
    </script>
</body>
</html>
